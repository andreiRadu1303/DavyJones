apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - postgres.yaml
  - redis.yaml
  - forgejo.yaml
  - central-api.yaml
  - rbac.yaml
  - ingress.yaml
  # vault-template.yaml and keda-scaler-template.yaml are NOT applied directly —
  # they are templates instantiated by the Central API per user/vault.
