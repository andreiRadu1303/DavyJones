apiVersion: apps/v1
kind: Deployment
metadata:
  name: central-api
  namespace: davyjones-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: central-api
  template:
    metadata:
      labels:
        app: central-api
    spec:
      containers:
      - name: api
        image: europe-west1-docker.pkg.dev/central-surf-270818/davyjones/cloud-api:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: central-api-secrets
        - configMapRef:
            name: central-api-config
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: central-api
  namespace: davyjones-system
spec:
  selector:
    app: central-api
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: central-api-config
  namespace: davyjones-system
data:
  DAVYJONES_DATABASE_URL: "postgresql+asyncpg://davyjones:davyjones@postgres.davyjones-system:5432/davyjones"
  DAVYJONES_REDIS_URL: "redis://redis.davyjones-system:6379/0"
  DAVYJONES_FORGEJO_URL: "http://forgejo.davyjones-system:3000"
  DAVYJONES_K8S_NAMESPACE_PREFIX: "dj-"
  DAVYJONES_API_URL: "https://api.davyjones.cloud"
---
apiVersion: v1
kind: Secret
metadata:
  name: central-api-secrets
  namespace: davyjones-system
type: Opaque
stringData:
  DAVYJONES_JWT_SECRET: "CHANGE-ME-IN-PRODUCTION"
  DAVYJONES_GITHUB_CLIENT_ID: ""
  DAVYJONES_GITHUB_CLIENT_SECRET: ""
  DAVYJONES_GOOGLE_CLIENT_ID: ""
  DAVYJONES_GOOGLE_CLIENT_SECRET: ""
  DAVYJONES_STRIPE_SECRET_KEY: ""
  DAVYJONES_STRIPE_WEBHOOK_SECRET: ""
  DAVYJONES_FORGEJO_ADMIN_TOKEN: ""
